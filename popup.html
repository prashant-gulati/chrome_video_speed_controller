<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Video Speed Controller</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <header>
      <span class="icon">⚡</span>
      <h1>Video Speed</h1>
    </header>

    <div class="speed-grid">
      <button class="speed-btn" data-speed="0.25">0.25×</button>
      <button class="speed-btn" data-speed="0.5">0.5×</button>
      <button class="speed-btn" data-speed="0.75">0.75×</button>
      <button class="speed-btn" data-speed="1">1×</button>
      <button class="speed-btn" data-speed="2">2×</button>
      <button class="speed-btn" data-speed="3">3×</button>
      <button class="speed-btn" data-speed="4">4×</button>
    </div>

    <div id="status" class="status hidden"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
